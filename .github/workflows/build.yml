name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev

      - name: Install GLFW
        run: sudo apt-get install -y libglfw3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Linux
          path: |
            build/Tetris
            build/shaders/
            build/textures/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLFW
        run: vcpkg install glfw3:x64-windows-static

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Windows
          path: |
            build/Release/Tetris.exe
            build/Release/shaders/
            build/Release/textures/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLFW
        run: brew install glfw

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package .app bundle
        run: zip -r Tetris-macOS.zip build/Tetris.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-macOS
          path: Tetris-macOS.zip
