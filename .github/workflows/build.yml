name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev

      - name: Install GLFW
        run: sudo apt-get install -y libglfw3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release/Tetris-Linux
          cp build/Tetris release/Tetris-Linux/
          cp -r build/shaders release/Tetris-Linux/
          cp -r build/textures release/Tetris-Linux/
          cd release
          zip -r Tetris-Linux.zip Tetris-Linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Linux
          path: release/Tetris-Linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLFW
        run: vcpkg install glfw3:x64-windows-static

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path release\Tetris-Windows
          Copy-Item build\Release\Tetris.exe release\Tetris-Windows\
          Copy-Item -Recurse build\Release\shaders release\Tetris-Windows\
          Copy-Item -Recurse build\Release\textures release\Tetris-Windows\
          Compress-Archive -Path release\Tetris-Windows -DestinationPath release\Tetris-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Windows
          path: release/Tetris-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLFW universal binary
        run: |
          brew fetch --force --bottle-tag=arm64_sonoma glfw
          cd /tmp
          git clone https://github.com/glfw/glfw.git
          cd glfw
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DGLFW_BUILD_EXAMPLES=OFF \
            -DGLFW_BUILD_TESTS=OFF \
            -DGLFW_BUILD_DOCS=OFF
          cmake --build build
          sudo cmake --install build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build

      - name: Package .app bundle
        run: zip -r Tetris-macOS.zip build/Tetris.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-macOS
          path: Tetris-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Tetris-Linux/Tetris-Linux.zip
            artifacts/Tetris-Windows/Tetris-Windows.zip
            artifacts/Tetris-macOS/Tetris-macOS.zip
